<body>

<div id="cf-header">
  <h1>🪙 M9 Game — 𝙧𝙚𝙡𝙖𝙮𝖈𝖍𝖆𝖙_Coinflip <span id="cf-status-row"><span id="cf-status-dot"></span><span id="cf-status-text">Connecting…</span></span></h1>
  <div id="cf-track-bar">
    <input id="cf-track-input" type="text" placeholder="Twitch username to track" />
    <button id="cf-track-btn">Track</button>
    <div id="cf-tracked-badge" style="display:none;">
      Tracking <span id="cf-tracked-name"></span>
      <button id="cf-untrack-btn" title="Stop tracking">✕</button>
    </div>
  </div>
  <input id="cf-channel-input" type="text" value="m9sypher" style="display:none;" />
</div>

<div id="cf-main">
  <div id="cf-side-col">
    <div class="cf-panel">
      <h2>Player</h2>
      <div id="cf-player-card-body">
        <div class="cf-player-empty">No player tracked yet.</div>
      </div>
    </div>
    <div class="cf-panel" id="cf-log-panel">
      <h2>Flip Log</h2>
      <div id="cf-log-feed">
        <div class="cf-log-empty">Nothing flipped yet.</div>
      </div>
    </div>
  </div>

  <div class="cf-panel" id="cf-coin-col">
    <h2>Coin Flip</h2>
    <div id="cf-coin-stage-wrap">
      <div id="cf-sparkle-field"></div>
      <div id="cf-coin-stage">
        <div id="cf-coin-glow"></div>
        <div class="cf-coin cf-coin-resting face-win" id="cf-coin">
          <div class="cf-face cf-face-win">🏆</div>
          <div class="cf-face cf-face-lose">💀</div>
        </div>
      </div>
      <div id="cf-result-text"></div>
      <div id="cf-result-sub"></div>
      <div id="cf-streak-line"></div>
      <div id="cf-history-strip"></div>
      <div id="cf-coin-hint"></div>
    </div>
    <div id="cf-command-bar">
      <div class="cf-cmd-pill flip">🪙 !coinflip &lt;wager&gt;</div>
      <div class="cf-cmd-pill range">Min 1 · Max 250 pts</div>
    </div>
  </div>

  <aside class="cf-panel" id="cf-stream-col">
    <h2>Stream</h2>
    <div id="cf-video-wrap">
      <iframe id="cf-twitch-video" src="" allowfullscreen scrolling="no"></iframe>
    </div>
    <div id="cf-twitch-chat-wrap">
      <iframe id="cf-twitch-chat" src=""></iframe>
    </div>
  </aside>

  <div id="cf-chat-input-bar">
    <div id="cf-chat-input-crop">
      <iframe id="cf-twitch-chat-input" src="" scrolling="no"></iframe>
    </div>
  </div>
</div>
